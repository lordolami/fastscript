name: ci

on:
  push:
  pull_request:

jobs:
  language-v1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint:fs
      - run: npm run typecheck
      - run: npm run test:fs-diag
      - run: npm run test:sourcemap-fidelity
      - run: npm run test:typecheck
      - run: npm run test:format-lint
      - run: npm run test:runtime-contract
      - run: npm run test:determinism
      - run: npm run test:parser-fuzz
      - run: npm run test:security-baseline
      - run: npm run test:conformance

  test:
    needs: language-v1
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run qa:gate
